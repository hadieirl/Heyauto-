<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Finder</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }
        html{
            background:#070709;
            height:100%;
        }
        body{
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:20px;
            background:#070709;
            min-height:100vh;
            overflow-x:hidden;
            color:white;
            position: relative;
        }

        /* INTENSIFIED NEON BACKDROP AURORAS */
        .ambient-glow-1 {
            position: fixed;
            top: -150px;
            left: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 193, 7, 0.28) 0%, rgba(255, 179, 0, 0.08) 45%, rgba(0,0,0,0) 70%);
            filter: blur(50px);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 8s infinite alternate ease-in-out;
        }

        .ambient-glow-2 {
            position: fixed;
            bottom: -50px;
            right: -150px;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(255, 193, 7, 0.28) 0%, rgba(255, 179, 0, 0.08) 45%, rgba(0,0,0,0)70%);
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 12s infinite alternate-reverse ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.8; }
            100% { transform: scale(1.15) translate(20px, 10px); opacity: 1; }
        }

        /* DROPDOWN WITH LUMINESCENT BORDER */
        #location{
            margin-top:85px;
            width:260px;
            padding:14px 16px;
            font-size:15px;
            border-radius:14px;
            border: 1px solid rgba(255, 193, 7, 0.3);
            background: rgba(18, 18, 22, 0.75);
            backdrop-filter: blur(12px);
            color:white;
            outline:none;
            cursor:pointer;
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        #location:hover{
            border-color: #FFC107;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
        }

        /* MAIN CARD WITH SYNTHWAVE EDGE GLOW */
        .app{
            position: relative;
            margin-top:110px;
            width:100%;
            max-width:420px;
            background: rgba(16, 16, 20, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 193, 7, 0.25);
            border-radius:24px;
            padding:28px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(255, 193, 7, 0.08); 
            z-index: 2;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .app:hover {
            border-color: rgba(255, 193, 7, 0.4);
            box-shadow: 0 35px 70px rgba(0,0,0,0.85), 0 0 60px rgba(255, 193, 7, 0.15);
        }

        .appi{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
        }
        .riksha{
            margin-top: -25px;
            filter: drop-shadow(0 4px 12px rgba(255, 193, 7, 0.4));
        }
        .hey{
            font-size:22px;
            font-weight:700;
            color:#FFC107;
            text-shadow: 0 0 12px rgba(255, 193, 7, 0.65), 0 2px 4px rgba(0,0,0,0.5);
        }

        button{
            width:100%;
            margin-top:18px;
            padding:14px;
            border:none;
            border-radius:14px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        #findBtn, .action-btn {
            background: linear-gradient(135deg, #FFD54F, #FFC107, #FFA000);
            color: #050507;
            box-shadow: 0 4px 20px rgba(255, 193, 7, 0.3);
        }

        #findBtn:hover, .action-btn:hover{
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 193, 7, 0.65);
        }

        .secondary-btn {
            background: rgba(30, 30, 36, 0.6);
            color: #FFC107;
            border: 1px solid rgba(255, 193, 7, 0.3);
            margin-top: 10px;
        }

        .secondary-btn:hover {
            background: rgba(30, 30, 36, 0.9);
            border-color: #FFC107;
        }

        .danger-btn {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
            margin-top: 10px;
        }

        .danger-btn:hover {
            background: rgba(244, 67, 54, 0.25);
            border-color: #f44336;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.2);
        }

        /* TOGGLE SELECTION COMPONENT FOR ACTIVE STATUS */
        .status-container {
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-label {
            font-size: 13px;
            color: #b0b0b8;
            margin-bottom: 8px;
            display: block;
        }

        .status-selector {
            display: flex;
            background: #121216;
            padding: 4px;
            border-radius: 10px;
            border: 1px solid rgba(255,193,7,0.1);
        }

        .status-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s ease;
            color: #777785;
        }

        .status-option.selected-active {
            background: #4CAF50;
            color: white;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
        }

        .status-option.selected-inactive {
            background: #f44336;
            color: white;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.4);
        }

        /* CUSTOMER APP BADGES FOR DRIVER STATUS */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .badge-active {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.1);
        }

        .badge-inactive {
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        #result{
            margin-top:25px;
            font-size:14px;
            color:#b0b0b8;
            text-align:center;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        #result::before, #result::after{
            content:"";
            width:25px;
            height:2px;
            background: linear-gradient(90deg, transparent, #FFC107);
            display:inline-block;
            margin:0 8px;
            vertical-align: middle;
            box-shadow: 0 0 8px #FFC107;
        }
        #result::after {
            background: linear-gradient(270deg, transparent, #FFC107);
        }

        #resulted{
            margin-top:15px;
            width:100%;
            max-width:420px;
            padding-bottom: 100px; 
        }

        .driver-card{
            background: rgba(20, 20, 26, 0.8);
            backdrop-filter: blur(12px);
            margin-bottom:14px;
            padding:18px;
            border-radius:18px;
            border: 1px solid rgba(255, 193, 7, 0.18);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position:relative;
            transition: 0.3s ease;
            z-index: 2;
        }

        /* FUEL-SPECIFIC INJECTED VISUAL STYLES */
        .card-cng {
            border: 1px solid rgba(76, 175, 80, 0.4) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(76, 175, 80, 0.05);
        }
        .card-cng .driver-banner {
            background: linear-gradient(90deg, #4CAF50, #81C784) !important;
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.4);
        }
        .card-cng h3 {
            color: #4CAF50 !important;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.4) !important;
        }
        .card-cng .fuel-txt {
            color: #81C784 !important;
            font-weight: bold;
        }

        .card-electric {
            border: 1px solid rgba(33, 150, 243, 0.4) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(33, 150, 243, 0.05);
        }
        .card-electric .driver-banner {
            background: linear-gradient(90deg, #2196F3, #00E5FF) !important;
            box-shadow: 0 2px 10px rgba(33, 150, 243, 0.4);
        }
        .card-electric h3 {
            color: #00E5FF !important;
            font-family: 'Segoe UI', Roboto, sans-serif;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4) !important;
        }
        .card-electric .fuel-txt {
            color: #00E5FF !important;
            font-weight: bold;
        }

        .card-petrol {
            border: 1px solid rgba(255, 193, 7, 0.3) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(255, 193, 7, 0.05);
        }
        .card-petrol .driver-banner {
            background: linear-gradient(90deg, #FFD54F, #FFC107, #FFA000) !important;
            box-shadow: 0 2px 10px rgba(255, 193, 7, 0.4);
        }
        .card-petrol h3 {
            color: #FFC107 !important;
            font-family: Arial, sans-serif;
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.3) !important;
        }
        .card-petrol .fuel-txt {
            color: #FFC107 !important;
            font-weight: bold;
        }

        .driver-card:hover{
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
        }
        .card-cng:hover { box-shadow: 0 12px 35px rgba(0,0,0,0.6), 0 0 20px rgba(76, 175, 80, 0.25); }
        .card-electric:hover { box-shadow: 0 12px 35px rgba(0,0,0,0.6), 0 0 20px rgba(33, 150, 243, 0.25); }
        .card-petrol:hover { box-shadow: 0 12px 35px rgba(0,0,0,0.6), 0 0 20px rgba(255, 193, 7, 0.3); }

        .driver-banner{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:5px;
            background: linear-gradient(90deg, #FFC107, #FF7043);
            box-shadow: 0 2px 10px rgba(255, 193, 7, 0.4);
            border-top-left-radius:18px;
            border-top-right-radius:18px;
        }

        .driver-card h3{
            color:#FFC107;
            margin-bottom:8px;
            margin-top:6px;
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
            max-width: 70%; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .driver-card p{
            color:#ddd;
            font-size:14px;
            margin:6px 0;
        }

        .driver-card a{
            color:#4dabf7;
            text-decoration:none;
            text-shadow: 0 0 10px rgba(77, 171, 247, 0.2);
        }

        .driver-card a:hover{
            text-decoration:underline;
            text-shadow: 0 0 12px rgba(77, 171, 247, 0.5);
        }

        .not-found{
            text-align:center;
            color:#aaa;
            margin-top:20px;
        }
        
        h1{
            text-align:center;
            color:#FFC107;
            margin-bottom:20px;
            text-shadow: 0 0 15px rgba(254, 193, 7, 0.4);
        }

        input, #place, .signup-select {
            width:100%;
            padding:12px;
            margin-bottom:5px;
            border-radius:12px;
            border:1px solid rgba(255,255,255,0.08);
            background:rgba(30, 30, 36, 0.6);
            color:white;
            outline:none;
            transition: 0.3s;
        }

        input:focus, #place:focus, .signup-select:focus{
            border-color:#FFC107;
            background:rgba(30, 30, 36, 0.9);
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.15);
        }

        .signup-select option {
            background: #1a1a24;
            color: white;
        }

        .error{
            color:#ff4d4d;
            font-size:12px;
            margin:0 0 10px 4px;
            height:14px;
        }

        #customerPage, #driverPage {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #customerPage.active-view, #driverPage.active-view {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .bottom-nav-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 380px;
            background: rgba(18, 18, 22, 0.85);
            backdrop-filter: blur(20px);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        .bottom-nav{
            display:flex;
            position: relative;
            width: 100%;
            height: 48px;
        }

        .bottom-nav button{
            flex:1;
            margin-top:0;
            border:none;
            background:none;
            color:#9a9ab0;
            font-size:15px;
            position:relative;
            z-index: 2;
            height: 100%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease, transform 0.1s ease;
        }

        .bottom-nav button:active {
            transform: scale(0.95);
        }

        .bottom-nav button.active-tab {
            color: #050507;
            font-weight: 800;
        }

        .nav-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%; 
            height: 100%;
            background: linear-gradient(135deg, #FFEB3B, #FFC107, #FF9800);
            border-radius: 25px;
            box-shadow: 0 0 25px rgba(255, 193, 7, 0.6);
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
        }

        .toggle-link {
            color: #4dabf7;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
            text-decoration: underline;
        }

        .hidden-field {
            display: none !important;
        }
    </style>
</head>

<body>

<div class="ambient-glow-1"></div>
<div class="ambient-glow-2"></div>
                                                                                
<div id="customerPage" class="active-view">
    <select id="location">
        <option selected>Kizhisseri</option>
        <option>Kondotty</option>
        <option>Mongam</option>
        <option>Areekode</option>
        <option>Ramanatukara</option>
        <option>Coimbature</option>
    </select>

    <div class="app">
        <div class="appi">
            <img class="riksha" style="width:45px;height:45px;" src="mirrored.PNG" alt="Logo">
            <h1 class="hey">ഹേയ് ഓട്ടോ!</h1>
        </div>
        <button id="findBtn">Find Auto</button>
    </div>

    <p id="result">Showing all registered autos</p>
    <div id="resulted"></div>
</div>

<div id="driverPage" style="display: none;">
    <div class="app hidden-field" id="driverProfileView">
        <h1 id="welcomeDriver">Welcome!</h1>
        
        <div class="status-container">
            <span class="status-label">Duty Status</span>
            <div class="status-selector">
                <div class="status-option" id="statusActiveBtn">Active</div>
                <div class="status-option" id="statusInactiveBtn">Inactive</div>
            </div>
        </div>

        <div class="driver-card" id="profileCardRoot" style="margin-top:5px; width:100%;">
            <div class="driver-banner"></div>
            <h3 id="profName">👤 --</h3>
            <p id="profGender">🧬 Gender: --</p>
            <p id="profPhone">📞 --</p>
            <p id="profPlace">📍 --</p>
            <p id="profFuel">⛽ Fuel: --</p>
            <p id="profPlate">🚕 --</p>
        </div>
        <button class="secondary-btn" id="logoutBtn">Logout Account</button>
        <button class="danger-btn" id="deleteBtn">Delete Account</button>
    </div>

    <div class="app" id="driverAuthView">
        <h1 id="authTitle">ഓട്ടോക്കാരൻ Sign In</h1>

        <input type="text" id="phone" placeholder="10 digit phone number">
        <div class="error" id="phoneError"></div>

        <input type="password" id="password" placeholder="Password (min 6 characters)">
        <div class="error" id="passError"></div>

        <div id="signUpFields" class="hidden-field">
            <input type="text" id="name" placeholder="Driver Name">
            <div class="error" id="nameError"></div>

            <input type="text" id="plate" placeholder="Vehicle Number (KL 01 AB 1234)">
            <div class="error" id="plateError"></div>

            <select id="gender" class="signup-select">
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <div class="error" id="genderError"></div>

            <select id="fuel" class="signup-select">
                <option value="" disabled selected>Select Fuel Type</option>
                <option value="CNG">CNG</option>
                <option value="Petrol">Petrol</option>
                <option value="Electric">Electric</option>
            </select>
            <div class="error" id="fuelError"></div>

            <select id="place">
                <option>Kizhisseri</option>
                <option>Kondotty</option>
                <option>Mongam</option>
                <option>Areekode</option>
                <option>Ramanatukara</option>
                <option>Coimbature</option>
            </select>
            <div style="height:15px;"></div>
        </div>

        <button class="action-btn" id="authSubmitBtn">Sign In</button>
        <p class="toggle-link" id="authToggleLink">New driver? Create an account (Sign Up)</p>
    </div>
</div>

<div class="bottom-nav-container">
    <div class="bottom-nav">
        <div class="nav-slider" id="navSlider"></div>
        <button id="customerBtn" class="active-tab">🛺 Passenger</button>
        <button id="driverBtn">👨‍✈️ Driver</button>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    doc,
    setDoc,
    getDoc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword, 
    signOut, 
    onAuthStateChanged,
    deleteUser,
    EmailAuthProvider,
    reauthenticateWithCredential
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4uGZ9g3ju9qAFg7OW-OfBy9Pf1-UfE1E",
  authDomain: "heyautoapp-55dae.firebaseapp.com",
  projectId: "heyautoapp-55dae",
  storageBucket: "heyautoapp-55dae.firebasestorage.app",
  messagingSenderId: "746327412038",
  appId: "1:746327412038:web:0a9b0fe55893f3f71ee947",
  measurementId: "G-0FPHR4SYPB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let isSignUpMode = false;
let currentUID = null;
let currentStatus = "Active"; 
let currentDriverPhone = ""; 

const locationSelect = document.getElementById("location");
const result = document.getElementById("result");
const findBtn = document.getElementById("findBtn");
const resulted = document.getElementById("resulted");

const driverAuthView = document.getElementById("driverAuthView");
const driverProfileView = document.getElementById("driverProfileView");
const signUpFields = document.getElementById("signUpFields");
const authTitle = document.getElementById("authTitle");
const authSubmitBtn = document.getElementById("authSubmitBtn");
const authToggleLink = document.getElementById("authToggleLink");
const logoutBtn = document.getElementById("logoutBtn");
const deleteBtn = document.getElementById("deleteBtn");

const statusActiveBtn = document.getElementById("statusActiveBtn");
const statusInactiveBtn = document.getElementById("statusInactiveBtn");

const phoneInput = document.getElementById("phone");
const passInput = document.getElementById("password");
const nameInput = document.getElementById("name");
const plateInput = document.getElementById("plate");
const genderSelect = document.getElementById("gender");
const fuelSelect = document.getElementById("fuel");
const placeSelect = document.getElementById("place");

const phoneError = document.getElementById("phoneError");
const passError = document.getElementById("passError");
const nameError = document.getElementById("nameError");
const plateError = document.getElementById("plateError");
const genderError = document.getElementById("genderError");
const fuelError = document.getElementById("fuelError");

const profileCardRoot = document.getElementById("profileCardRoot");

function formatEmail(phone) {
    return `${phone.trim()}@heyauto.com`;
}

function updateStatusUI(status) {
    currentStatus = status;
    if (status === "Active") {
        statusActiveBtn.classList.add("selected-active");
        statusInactiveBtn.classList.remove("selected-inactive");
    } else {
        statusActiveBtn.classList.remove("selected-active");
        statusInactiveBtn.classList.add("selected-inactive");
    }
}

async function setDriverStatusInFirebase(status) {
    if (!currentUID) return;
    try {
        const docRef = doc(db, "Drivers", currentUID);
        await updateDoc(docRef, { status: status });
    } catch (e) {
        console.error("Error updating status field", e);
    }
}

statusActiveBtn.addEventListener("click", () => {
    if (currentStatus !== "Active") {
        updateStatusUI("Active");
        setDriverStatusInFirebase("Active");
    }
});

statusInactiveBtn.addEventListener("click", () => {
    if (currentStatus !== "Inactive") {
        updateStatusUI("Inactive");
        setDriverStatusInFirebase("Inactive");
    }
});

function getFuelClass(fuel) {
    if (!fuel) return "card-petrol";
    const f = fuel.toUpperCase();
    if (f === "CNG") return "card-cng";
    if (f === "ELECTRIC") return "card-electric";
    return "card-petrol";
}

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUID = user.uid;
        driverAuthView.classList.add("hidden-field");
        driverProfileView.classList.remove("hidden-field");
        
        try {
            const docRef = doc(db, "Drivers", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                currentDriverPhone = data.phone; 
                document.getElementById("welcomeDriver").textContent = `Welcome, ${data.name}!`;
                document.getElementById("profName").textContent = `👤 ${data.name}`;
                document.getElementById("profGender").textContent = `🧬 Gender: ${data.gender || '--'}`;
                document.getElementById("profPhone").textContent = `📞 ${data.phone}`;
                document.getElementById("profPlace").textContent = `📍 ${data.place}`;
                document.getElementById("profFuel").textContent = `⛽ Fuel: ${data.fuel || '--'}`;
                document.getElementById("profPlate").textContent = `🚕 Plate: ${data.plate}`;
                
                profileCardRoot.className = "driver-card " + getFuelClass(data.fuel);

                const dbStatus = data.status || "Active";
                updateStatusUI(dbStatus);
            }
        } catch (e) {
            console.error("Error loading profile layout", e);
        }
    } else {
        currentUID = null;
        currentDriverPhone = "";
        driverProfileView.classList.add("hidden-field");
        driverAuthView.classList.remove("hidden-field");
    }
});

authToggleLink.addEventListener("click", () => {
    isSignUpMode = !isSignUpMode;
    phoneError.textContent = ""; passError.textContent = ""; nameError.textContent = ""; plateError.textContent = ""; genderError.textContent = ""; fuelError.textContent = "";
    
    if (isSignUpMode) {
        authTitle.textContent = "ഓട്ടോക്കാരൻ Sign Up";
        authSubmitBtn.textContent = "Create Account & Sign Up";
        authToggleLink.textContent = "Already have an account? Sign In";
        signUpFields.classList.remove("hidden-field");
    } else {
        authTitle.textContent = "ഓട്ടോക്കാരൻ Sign In";
        authSubmitBtn.textContent = "Sign In";
        authToggleLink.textContent = "New driver? Create an account (Sign Up)";
        signUpFields.classList.add("hidden-field");
    }
});

authSubmitBtn.addEventListener("click", async () => {
    let valid = true;
    phoneError.textContent = ""; passError.textContent = ""; nameError.textContent = ""; plateError.textContent = ""; genderError.textContent = ""; fuelError.textContent = "";

    const phoneValue = phoneInput.value.trim();
    const passValue = passInput.value;

    if(phoneValue === "") {
        phoneError.textContent = "This field is required";
        valid = false;
    } else if(!/^\d{10}$/.test(phoneValue)) {
        phoneError.textContent = "Enter exactly 10 digits";
        valid = false;
    }

    if(passValue.length < 6) {
        passError.textContent = "Password must be at least 6 characters";
        valid = false;
    }

    if (isSignUpMode) {
        if(nameInput.value.trim() === ""){
            nameError.textContent = "This field is required";
            valid = false;
        }

        const plateValue = plateInput.value.trim();
        const platePattern = /^[A-Z]{2}\s?\d{2}\s?[A-Z]{1,2}\s?\d{1,4}$/;

        if(plateValue === ""){
            plateError.textContent = "This field is required";
            valid = false;
        } else if(!platePattern.test(plateValue.toUpperCase())){
            plateError.textContent = "Enter valid format like KL 01 AB 1234";
            valid = false;
        }

        if(!genderSelect.value || genderSelect.value === "") {
            genderError.textContent = "Gender selection is mandatory to register.";
            valid = false;
        }

        if(!fuelSelect.value || fuelSelect.value === "") {
            fuelError.textContent = "Fuel type selection is mandatory to register.";
            valid = false;
        }
    }

    if(!valid) return;

    const fakeEmail = formatEmail(phoneValue);

    if (isSignUpMode) {
        try {
            const credential = await createUserWithEmailAndPassword(auth, fakeEmail, passValue);
            
            await setDoc(doc(db, "Drivers", credential.user.uid), {
                uid: credential.user.uid,
                name: nameInput.value.trim(),
                phone: phoneValue,
                plate: plateInput.value.trim().toUpperCase(),
                gender: genderSelect.value,
                fuel: fuelSelect.value,
                place: placeSelect.value,
                status: "Active" 
            });

            alert("Driver account created and uploaded successfully!");
            nameInput.value = ""; plateInput.value = ""; phoneInput.value = ""; passInput.value = "";
            genderSelect.value = ""; fuelSelect.value = "";
        } catch(error) {
            console.error(error);
            if (error.code === "auth/email-already-in-use" || error.code === "auth/credential-already-in-use") {
                phoneError.textContent = "This number already exists!";
                alert("Registration failed: This phone number is already registered.");
            } else {
                alert("Registration failed: " + error.message);
            }
        }
    } else {
        try {
            await signInWithEmailAndPassword(auth, fakeEmail, passValue);
            alert("Logged in successfully!");
            phoneInput.value = ""; passInput.value = "";
        } catch(error) {
            console.error(error);
            alert("Authentication failed: Check phone number or password.");
        }
    }
});

logoutBtn.addEventListener("click", async () => {
    try {
        await signOut(auth);
        alert("Logged out successfully!");
    } catch(e) {
        console.error(e);
    }
});

deleteBtn.addEventListener("click", async () => {
    const confirmFirst = confirm("Are you sure you want to permanently delete your driver account? This action cannot be undone.");
    if (!confirmFirst) return;

    const typedPassword = prompt("Please enter your password to confirm deletion:");
    if (typedPassword === null) return; 
    if (typedPassword.trim() === "") {
        alert("Password cannot be empty.");
        return;
    }

    const user = auth.currentUser;
    if (!user || !currentDriverPhone) {
        alert("Session lost. Please log in again to delete your account.");
        return;
    }

    const fakeEmail = formatEmail(currentDriverPhone);
    const credential = EmailAuthProvider.credential(fakeEmail, typedPassword);

    try {
        await reauthenticateWithCredential(user, credential);
        
        const docRef = doc(db, "Drivers", user.uid);
        await deleteDoc(docRef);
        await deleteUser(user);

        alert("Your driver profile has been completely deleted.");
    } catch (error) {
        console.error(error);
        alert("Deletion failed: Password incorrect or network error.");
    }
});

async function loadAllDrivers() {
    const selectedLocation = locationSelect.value;
    result.textContent = `Showing autos for location: ${selectedLocation}`;
    resulted.innerHTML = "";

    try {
        const snapshot = await getDocs(collection(db, "Drivers"));
        const drivers = [];

     snapshot.forEach(doc => {
    const driver = doc.data();

    if (
        driver.place &&
        driver.place.toLowerCase() === selectedLocation.toLowerCase()
    ) {
        drivers.push(driver);
    }
});
        if(drivers.length === 0){
            resulted.innerHTML = `<p class="not-found">No drivers registered on the system yet.</p>`;
            return;
        }

        drivers.sort((a, b) => {
            const matchA = a.place === selectedLocation ? 1 : 0;
            const matchB = b.place === selectedLocation ? 1 : 0;
            
            if (matchA !== matchB) {
                return matchB - matchA; 
            }
            
            const statusA = a.status || "Active";
            const statusB = b.status || "Active";
            if (statusA === "Active" && statusB !== "Active") return -1;
            if (statusA !== "Active" && statusB === "Active") return 1;
            return 0;
        });

        drivers.forEach(driver => {
            const currentDriverStatus = driver.status || "Active";
            const isDriverActive = currentDriverStatus === "Active";

            const badgeClass = isDriverActive ? "badge-active" : "badge-inactive";
            const badgeText = isDriverActive ? "Active" : "Inactive";
            
            const driverGender = driver.gender || "Not specified";
            const driverFuel = driver.fuel || "Not specified";
            const fuelThemeClass = getFuelClass(driverFuel);

            const card = document.createElement("div");
            card.className = `driver-card ${fuelThemeClass}`;
            card.innerHTML = `
                <div class="driver-banner"></div>
                <span class="badge ${badgeClass}">${badgeText}</span>
                <h3>👤 ${driver.name}</h3>
                <p>🧬 <strong>Gender:</strong> ${driverGender}</p>
                <p><a href="tel:${driver.phone}">📞 ${driver.phone}</a></p>
                <p>📍 <strong>Hub:</strong> ${driver.place}</p>
                <p>⛽ <strong>Fuel Type:</strong> <span class="fuel-txt">${driverFuel}</span></p>
                <p>🚕 <strong>Number Plate:</strong> ${driver.plate}</p>
            `;
            resulted.appendChild(card);
        });

    } catch(error) {
        console.error(error);
        resulted.innerHTML = `<p class="not-found">Failed to load drivers.</p>`;
    }
}

findBtn.addEventListener("click", loadAllDrivers);
window.addEventListener("DOMContentLoaded", loadAllDrivers);
