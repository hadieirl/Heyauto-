<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeyAuto!</title>
    <link rel="stylesheet" href="index.css">

</head>

<body>

<div class="ambient-glow-1"></div>
<div class="ambient-glow-2"></div>
                                                                                
<div id="customerPage" class="active-view">
    <select id="location">
        <option selected>Kizhisseri</option>
        <option>Kondotty</option>
        <option>Mongam</option>
        <option>Areekode</option>
        <option>Ramanatukara</option>
        <option>Coimbature</option>
    </select>

    <div class="app">
        <div class="appi">
            <img class="riksha" style="width:45px;height:45px;" src="mirrored.PNG" alt="Logo">
            <h1 class="hey">ഹേയ് ഓട്ടോ!</h1>
        </div>
        <button id="findBtn">Find Auto</button>
    </div>

    <p id="result">Showing all registered autos</p>
    <div id="resulted"></div>
</div>

<div id="driverPage" style="display: none;">
    <div class="app hidden-field" id="driverProfileView">
        <h1 id="welcomeDriver">Welcome!</h1>
        
        <div class="status-container">
            <span class="status-label">Duty Status</span>
            <div class="status-selector">
                <div class="status-option" id="statusActiveBtn">Active</div>
                <div class="status-option" id="statusInactiveBtn">Inactive</div>
            </div>
        </div>

        <div class="driver-card" id="profileCardRoot" style="margin-top:5px; width:100%;">
            <div class="driver-banner"></div>
            <h3 id="profName">👤 --</h3>
            <p id="profGender">🧬 Gender: --</p>
            <p id="profPhone">📞 --</p>
            <p id="profPlace">📍 --</p>
            <p id="profFuel">⛽ Fuel: --</p>
            <p id="profPlate">🚕 --</p>
        </div>
        <button class="secondary-btn" id="logoutBtn">Logout Account</button>
        <button class="danger-btn" id="deleteBtn">Delete Account</button>
    </div>

    <div class="app" id="driverAuthView">
        <h1 id="authTitle">ഓട്ടോക്കാരൻ Sign In</h1>

        <input type="text" id="phone" placeholder="10 digit phone number">
        <div class="error" id="phoneError"></div>

        <input type="password" id="password" placeholder="Password (min 6 characters)">
        <div class="error" id="passError"></div>

        <div id="signUpFields" class="hidden-field">
            <input type="text" id="name" placeholder="Driver Name">
            <div class="error" id="nameError"></div>

            <input type="text" id="plate" placeholder="Vehicle Number (KL 01 AB 1234)">
            <div class="error" id="plateError"></div>

            <select id="gender" class="signup-select">
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <div class="error" id="genderError"></div>

            <select id="fuel" class="signup-select">
                <option value="" disabled selected>Select Fuel Type</option>
                <option value="CNG">CNG</option>
                <option value="Petrol">Petrol</option>
                <option value="Electric">Electric</option>
            </select>
            <div class="error" id="fuelError"></div>

            <select id="place">
                <option>Kizhisseri</option>
                <option>Kondotty</option>
                <option>Mongam</option>
                <option>Areekode</option>
                <option>Ramanatukara</option>
                <option>Coimbature</option>
            </select>
            <div style="height:15px;"></div>
        </div>

        <button class="action-btn" id="authSubmitBtn">Sign In</button>
        <p class="toggle-link" id="authToggleLink">New driver? Create an account (Sign Up)</p>
    </div>
</div>

<div class="bottom-nav-container">
    <div class="bottom-nav">
        <div class="nav-slider" id="navSlider"></div>
        <button id="customerBtn" class="active-tab">🛺 Passenger</button>
        <button id="driverBtn">👨‍✈️ Driver</button>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    doc,
    setDoc,
    getDoc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword, 
    signOut, 
    onAuthStateChanged,
    deleteUser,
    EmailAuthProvider,
    reauthenticateWithCredential
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4uGZ9g3ju9qAFg7OW-OfBy9Pf1-UfE1E",
  authDomain: "heyautoapp-55dae.firebaseapp.com",
  projectId: "heyautoapp-55dae",
  storageBucket: "heyautoapp-55dae.firebasestorage.app",
  messagingSenderId: "746327412038",
  appId: "1:746327412038:web:0a9b0fe55893f3f71ee947",
  measurementId: "G-0FPHR4SYPB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let isSignUpMode = false;
let currentUID = null;
let currentStatus = "Active"; 
let currentDriverPhone = ""; 

const locationSelect = document.getElementById("location");
const result = document.getElementById("result");
const findBtn = document.getElementById("findBtn");
const resulted = document.getElementById("resulted");

const driverAuthView = document.getElementById("driverAuthView");
const driverProfileView = document.getElementById("driverProfileView");
const signUpFields = document.getElementById("signUpFields");
const authTitle = document.getElementById("authTitle");
const authSubmitBtn = document.getElementById("authSubmitBtn");
const authToggleLink = document.getElementById("authToggleLink");
const logoutBtn = document.getElementById("logoutBtn");
const deleteBtn = document.getElementById("deleteBtn");

const statusActiveBtn = document.getElementById("statusActiveBtn");
const statusInactiveBtn = document.getElementById("statusInactiveBtn");

const phoneInput = document.getElementById("phone");
const passInput = document.getElementById("password");
const nameInput = document.getElementById("name");
const plateInput = document.getElementById("plate");
const genderSelect = document.getElementById("gender");
const fuelSelect = document.getElementById("fuel");
const placeSelect = document.getElementById("place");

const phoneError = document.getElementById("phoneError");
const passError = document.getElementById("passError");
const nameError = document.getElementById("nameError");
const plateError = document.getElementById("plateError");
const genderError = document.getElementById("genderError");
const fuelError = document.getElementById("fuelError");

const profileCardRoot = document.getElementById("profileCardRoot");

function formatEmail(phone) {
    return `${phone.trim()}@heyauto.com`;
}

function updateStatusUI(status) {
    currentStatus = status;
    if (status === "Active") {
        statusActiveBtn.classList.add("selected-active");
        statusInactiveBtn.classList.remove("selected-inactive");
    } else {
        statusActiveBtn.classList.remove("selected-active");
        statusInactiveBtn.classList.add("selected-inactive");
    }
}

async function setDriverStatusInFirebase(status) {
    if (!currentUID) return;
    try {
        const docRef = doc(db, "Drivers", currentUID);
        await updateDoc(docRef, { status: status });
    } catch (e) {
        console.error("Error updating status field", e);
    }
}

statusActiveBtn.addEventListener("click", () => {
    if (currentStatus !== "Active") {
        updateStatusUI("Active");
        setDriverStatusInFirebase("Active");
    }
});

statusInactiveBtn.addEventListener("click", () => {
    if (currentStatus !== "Inactive") {
        updateStatusUI("Inactive");
        setDriverStatusInFirebase("Inactive");
    }
});

function getFuelClass(fuel) {
    if (!fuel) return "card-petrol";
    const f = fuel.toUpperCase();
    if (f === "CNG") return "card-cng";
    if (f === "ELECTRIC") return "card-electric";
    return "card-petrol";
}

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUID = user.uid;
        driverAuthView.classList.add("hidden-field");
        driverProfileView.classList.remove("hidden-field");
        
        try {
            const docRef = doc(db, "Drivers", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                currentDriverPhone = data.phone; 
                document.getElementById("welcomeDriver").textContent = `Welcome, ${data.name}!`;
                document.getElementById("profName").textContent = `👤 ${data.name}`;
                document.getElementById("profGender").textContent = `🧬 Gender: ${data.gender || '--'}`;
                document.getElementById("profPhone").textContent = `📞 ${data.phone}`;
                document.getElementById("profPlace").textContent = `📍 ${data.place}`;
                document.getElementById("profFuel").textContent = `⛽ Fuel: ${data.fuel || '--'}`;
                document.getElementById("profPlate").textContent = `🚕 Plate: ${data.plate}`;
                
                profileCardRoot.className = "driver-card " + getFuelClass(data.fuel);

                const dbStatus = data.status || "Active";
                updateStatusUI(dbStatus);
            }
        } catch (e) {
            console.error("Error loading profile layout", e);
        }
    } else {
        currentUID = null;
        currentDriverPhone = "";
        driverProfileView.classList.add("hidden-field");
        driverAuthView.classList.remove("hidden-field");
    }
});

authToggleLink.addEventListener("click", () => {
    isSignUpMode = !isSignUpMode;
    phoneError.textContent = ""; passError.textContent = ""; nameError.textContent = ""; plateError.textContent = ""; genderError.textContent = ""; fuelError.textContent = "";
    
    if (isSignUpMode) {
        authTitle.textContent = "ഓട്ടോക്കാരൻ Sign Up";
        authSubmitBtn.textContent = "Create Account & Sign Up";
        authToggleLink.textContent = "Already have an account? Sign In";
        signUpFields.classList.remove("hidden-field");
    } else {
        authTitle.textContent = "ഓട്ടോക്കാരൻ Sign In";
        authSubmitBtn.textContent = "Sign In";
        authToggleLink.textContent = "New driver? Create an account (Sign Up)";
        signUpFields.classList.add("hidden-field");
    }
});

authSubmitBtn.addEventListener("click", async () => {
    let valid = true;
    phoneError.textContent = ""; passError.textContent = ""; nameError.textContent = ""; plateError.textContent = ""; genderError.textContent = ""; fuelError.textContent = "";

    const phoneValue = phoneInput.value.trim();
    const passValue = passInput.value;

    if(phoneValue === "") {
        phoneError.textContent = "This field is required";
        valid = false;
    } else if(!/^\d{10}$/.test(phoneValue)) {
        phoneError.textContent = "Enter exactly 10 digits";
        valid = false;
    }

    if(passValue.length < 6) {
        passError.textContent = "Password must be at least 6 characters";
        valid = false;
    }

    if (isSignUpMode) {
        if(nameInput.value.trim() === ""){
            nameError.textContent = "This field is required";
            valid = false;
        }

        const plateValue = plateInput.value.trim();
        const platePattern = /^[A-Z]{2}\s?\d{2}\s?[A-Z]{1,2}\s?\d{1,4}$/;

        if(plateValue === ""){
            plateError.textContent = "This field is required";
            valid = false;
        } else if(!platePattern.test(plateValue.toUpperCase())){
            plateError.textContent = "Enter valid format like KL 01 AB 1234";
            valid = false;
        }

        if(!genderSelect.value || genderSelect.value === "") {
            genderError.textContent = "Gender selection is mandatory to register.";
            valid = false;
        }

        if(!fuelSelect.value || fuelSelect.value === "") {
            fuelError.textContent = "Fuel type selection is mandatory to register.";
            valid = false;
        }
    }

    if(!valid) return;

    const fakeEmail = formatEmail(phoneValue);

    if (isSignUpMode) {
        try {
            const credential = await createUserWithEmailAndPassword(auth, fakeEmail, passValue);
            
            await setDoc(doc(db, "Drivers", credential.user.uid), {
                uid: credential.user.uid,
                name: nameInput.value.trim(),
                phone: phoneValue,
                plate: plateInput.value.trim().toUpperCase(),
                gender: genderSelect.value,
                fuel: fuelSelect.value,
                place: placeSelect.value,
                status: "Active" 
            });

            alert("Driver account created and uploaded successfully!");
            nameInput.value = ""; plateInput.value = ""; phoneInput.value = ""; passInput.value = "";
            genderSelect.value = ""; fuelSelect.value = "";
        } catch(error) {
            console.error(error);
            if (error.code === "auth/email-already-in-use" || error.code === "auth/credential-already-in-use") {
                phoneError.textContent = "This number already exists!";
                alert("Registration failed: This phone number is already registered.");
            } else {
                alert("Registration failed: " + error.message);
            }
        }
    } else {
        try {
            await signInWithEmailAndPassword(auth, fakeEmail, passValue);
            alert("Logged in successfully!");
            phoneInput.value = ""; passInput.value = "";
        } catch(error) {
            console.error(error);
            alert("Authentication failed: Check phone number or password.");
        }
    }
});

logoutBtn.addEventListener("click", async () => {
    try {
        await signOut(auth);
        alert("Logged out successfully!");
    } catch(e) {
        console.error(e);
    }
});

deleteBtn.addEventListener("click", async () => {
    const confirmFirst = confirm("Are you sure you want to permanently delete your driver account? This action cannot be undone.");
    if (!confirmFirst) return;

    const typedPassword = prompt("Please enter your password to confirm deletion:");
    if (typedPassword === null) return; 
    if (typedPassword.trim() === "") {
        alert("Password cannot be empty.");
        return;
    }

    const user = auth.currentUser;
    if (!user || !currentDriverPhone) {
        alert("Session lost. Please log in again to delete your account.");
        return;
    }

    const fakeEmail = formatEmail(currentDriverPhone);
    const credential = EmailAuthProvider.credential(fakeEmail, typedPassword);

    try {
        await reauthenticateWithCredential(user, credential);
        
        const docRef = doc(db, "Drivers", user.uid);
        await deleteDoc(docRef);
        await deleteUser(user);

        alert("Your driver profile has been completely deleted.");
    } catch (error) {
        console.error(error);
        alert("Deletion failed: Password incorrect or network error.");
    }
});

async function loadAllDrivers() {
    const selectedLocation = locationSelect.value;
    result.textContent = `Showing autos for location: ${selectedLocation}`;
    resulted.innerHTML = "";

    try {
        const snapshot = await getDocs(collection(db, "Drivers"));
        const drivers = [];

     snapshot.forEach(doc => {
    const driver = doc.data();

    if (
        driver.place &&
        driver.place.toLowerCase() === selectedLocation.toLowerCase()
    ) {
        drivers.push(driver);
    }
});
        if(drivers.length === 0){
            resulted.innerHTML = `<p class="not-found">No drivers registered on the system yet.</p>`;
            return;
        }

        drivers.sort((a, b) => {
            const matchA = a.place === selectedLocation ? 1 : 0;
            const matchB = b.place === selectedLocation ? 1 : 0;
            
            if (matchA !== matchB) {
                return matchB - matchA; 
            }
            
            const statusA = a.status || "Active";
            const statusB = b.status || "Active";
            if (statusA === "Active" && statusB !== "Active") return -1;
            if (statusA !== "Active" && statusB === "Active") return 1;
            return 0;
        });

        drivers.forEach(driver => {
            const currentDriverStatus = driver.status || "Active";
            const isDriverActive = currentDriverStatus === "Active";

            const badgeClass = isDriverActive ? "badge-active" : "badge-inactive";
            const badgeText = isDriverActive ? "Active" : "Inactive";
            
            const driverGender = driver.gender || "Not specified";
            const driverFuel = driver.fuel || "Not specified";
            const fuelThemeClass = getFuelClass(driverFuel);

            const card = document.createElement("div");
            card.className = `driver-card ${fuelThemeClass}`;
            card.innerHTML = `
                <div class="driver-banner"></div>
                <span class="badge ${badgeClass}">${badgeText}</span>
                <h3>👤 ${driver.name}</h3>
                <p>🧬 <strong>Gender:</strong> ${driverGender}</p>
                <p><a href="tel:${driver.phone}">📞 ${driver.phone}</a></p>
                <p>📍 <strong>Hub:</strong> ${driver.place}</p>
                <p>⛽ <strong>Fuel Type:</strong> <span class="fuel-txt">${driverFuel}</span></p>
                <p>🚕 <strong>Number Plate:</strong> ${driver.plate}</p>
            `;
            resulted.appendChild(card);
        });

    } catch(error) {
        console.error(error);
        resulted.innerHTML = `<p class="not-found">Failed to load drivers.</p>`;
    }
}

findBtn.addEventListener("click", loadAllDrivers);
window.addEventListener("DOMContentLoaded", loadAllDrivers);

const customerPage = document.getElementById("customerPage");
const driverPage = document.getElementById("driverPage");
const customerBtn = document.getElementById("customerBtn");
const driverBtn = document.getElementById("driverBtn");
const navSlider = document.getElementById("navSlider");

driverBtn.addEventListener("click", () => {
    customerPage.classList.remove("active-view");
    setTimeout(() => {
        customerPage.style.display = "none";
        driverPage.style.display = "flex";
        void driverPage.offsetWidth; 
        driverPage.classList.add("active-view");
    }, 200);
    navSlider.style.transform = "translateX(100%)";
    driverBtn.classList.add("active-tab");
    customerBtn.classList.remove("active-tab");
});

customerBtn.addEventListener("click", () => {
    driverPage.classList.remove("active-view");
    setTimeout(() => {
        driverPage.style.display = "none";
        customerPage.style.display = "flex";
        void customerPage.offsetWidth; 
        customerPage.classList.add("active-view");
    }, 200);
    navSlider.style.transform = "translateX(0%)";
    customerBtn.classList.add("active-tab");
    driverBtn.classList.remove("active-tab");
});

</script>
</body>
</html>
